name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - multiple OTP versions
          - os: ubuntu-latest
            otp: '26'
          - os: ubuntu-latest
            otp: '27'
          # macOS (use macos-15 for ARM64)
          - os: macos-15
            otp: '27'
          # Windows disabled for now - BoringSSL CRT linkage issues with MSVC
          # Need to investigate static vs dynamic CRT mismatch
          # - os: windows-2022
          #   otp: '27'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Linux: Use erlef/setup-beam
      - name: Set up Erlang (Linux/Windows)
        if: runner.os != 'macOS'
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'

      # macOS: Use brew (more reliable on ARM64)
      - name: Set up Erlang (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
        run: |
          brew update
          brew install erlang@${{ matrix.otp }} libsodium cmake ninja
          echo "$(brew --prefix erlang@${{ matrix.otp }})/bin" >> $GITHUB_PATH

      - name: Install rebar3 (macOS)
        if: runner.os == 'macOS'
        run: |
          wget https://github.com/erlang/rebar3/releases/download/3.24.0/rebar3 && chmod +x rebar3
          sudo mv rebar3 /usr/local/bin/

      # Linux dependencies
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev cmake ninja-build g++ perl

      # Windows dependencies and MSVC setup
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja nasm -y
          vcpkg install libsodium:x64-windows
          echo "SODIUM_LIB_DIR=C:/vcpkg/installed/x64-windows/lib" >> $env:GITHUB_ENV
          echo "SODIUM_INCLUDE_DIR=C:/vcpkg/installed/x64-windows/include" >> $env:GITHUB_ENV

      # Set up MSVC environment for Windows builds
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache rebar3 dependencies
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp${{ matrix.otp }}-rebar3-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-rebar3-

      - name: Compile
        run: rebar3 compile

      - name: Run EUnit tests
        run: rebar3 eunit

      # CT tests require server setup (certs, ports) - skip in CI for now
      # EUnit covers core functionality, CT is for full integration testing
      # - name: Run Common Test
      #   run: rebar3 ct

      # Dialyzer has warnings that need fixing - don't fail CI on them yet
      - name: Run Dialyzer
        if: runner.os == 'Linux'
        run: rebar3 dialyzer || true

      - name: Run Xref
        if: runner.os == 'Linux'
        run: rebar3 xref

      - name: Build release
        run: rebar3 release

      - name: Build escript
        run: rebar3 escriptize

  # FreeBSD - runs in a VM since no native runner
  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            export IGNORE_OSVERSION=yes
            pkg update -f
            pkg upgrade -y
            pkg install -y erlang-runtime27 rebar3 libsodium cmake ninja git gmake llvm18 perl5
          run: |
            export PATH="/usr/local/lib/erlang27/bin:$PATH"
            export CC=/usr/local/bin/clang18
            export CXX=/usr/local/bin/clang++18
            git config --global --add safe.directory $GITHUB_WORKSPACE
            rebar3 compile
            rebar3 eunit

