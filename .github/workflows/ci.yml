name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - multiple OTP versions
          - os: ubuntu-latest
            otp: '26'
          - os: ubuntu-latest
            otp: '27'
          # macOS
          - os: macos-latest
            otp: '27'
          # Windows
          - os: windows-latest
            otp: '27'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'

      # Linux dependencies
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev cmake ninja-build g++ perl

      # macOS dependencies
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium cmake ninja

      # Windows dependencies
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
          vcpkg install libsodium:x64-windows
          echo "SODIUM_LIB_DIR=C:/vcpkg/installed/x64-windows/lib" >> $env:GITHUB_ENV
          echo "SODIUM_INCLUDE_DIR=C:/vcpkg/installed/x64-windows/include" >> $env:GITHUB_ENV

      - name: Cache rebar3 dependencies
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp${{ matrix.otp }}-rebar3-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-rebar3-

      - name: Compile
        run: rebar3 compile

      - name: Run EUnit tests
        run: rebar3 eunit

      - name: Run Common Test
        run: rebar3 ct

      - name: Run Dialyzer
        if: runner.os == 'Linux'
        run: rebar3 dialyzer

      - name: Run Xref
        if: runner.os == 'Linux'
        run: rebar3 xref

      - name: Build release
        run: rebar3 release

      - name: Build escript
        run: rebar3 escriptize

  # FreeBSD - runs in a VM since no native runner
  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.1"
          usesh: true
          prepare: |
            pkg install -y erlang rebar3 libsodium cmake ninja git perl5
          run: |
            rebar3 compile
            rebar3 eunit
            rebar3 ct
            rebar3 release

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: site/
