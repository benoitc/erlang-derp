services:
  derp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: derp-server
    ports:
      - "3443:443"
      - "3080:80"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - DERP_PORT=443
      - DERP_WS_PORT=80
      - DERP_CERTFILE=/app/certs/server.crt
      - DERP_KEYFILE=/app/certs/server.key
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "443"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - derp-net

  # Test client container
  derp-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    container_name: derp-test
    depends_on:
      derp-server:
        condition: service_healthy
    environment:
      - DERP_SERVER_HOST=derp-server
      - DERP_SERVER_PORT=443
    volumes:
      - ./certs:/app/certs:ro
      - ../test:/app/test:ro
    networks:
      - derp-net
    command: ["rebar3", "ct", "--config", "test/ct.config"]

networks:
  derp-net:
    driver: bridge
